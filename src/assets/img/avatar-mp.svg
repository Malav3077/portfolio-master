<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#111118"/>
      <stop offset="100%" stop-color="#0d0d14"/>
    </linearGradient>
    <linearGradient id="glow" x1="100" y1="100" x2="300" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00d2c8" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00d2c8" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="100" y1="180" x2="300" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#a0a0a0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d2c8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00d2c8" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="520" rx="24" fill="url(#bg)"/>
  <rect width="400" height="520" rx="24" fill="url(#glow)"/>

  <!-- Subtle grid pattern -->
  <line x1="0" y1="130" x2="400" y2="130" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="260" x2="400" y2="260" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="390" x2="400" y2="390" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="133" y1="0" x2="133" y2="520" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="267" y1="0" x2="267" y2="520" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>

  <!-- Geometric accents -->
  <path d="M50 80 L70 60 L90 80 L70 100 Z" fill="none" stroke="#00d2c8" stroke-opacity="0.2" stroke-width="1"/>
  <path d="M310 420 L330 400 L350 420 L330 440 Z" fill="none" stroke="#00d2c8" stroke-opacity="0.15" stroke-width="1"/>
  <circle cx="340" cy="100" r="3" fill="#00d2c8" fill-opacity="0.2"/>
  <circle cx="60" cy="440" r="2" fill="#00d2c8" fill-opacity="0.15"/>

  <!-- Corner brackets -->
  <path d="M30 40 L30 20 L50 20" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1.5"/>
  <path d="M370 40 L370 20 L350 20" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1.5"/>
  <path d="M30 480 L30 500 L50 500" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1.5"/>
  <path d="M370 480 L370 500 L350 500" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1.5"/>

  <!-- Main "MP" text -->
  <text x="200" y="280" text-anchor="middle" font-family="'Oxanium', system-ui, sans-serif" font-size="120" font-weight="900" fill="url(#textGrad)" letter-spacing="8">MP</text>

  <!-- Subtitle line -->
  <line x1="130" y1="310" x2="270" y2="310" stroke="#00d2c8" stroke-opacity="0.25" stroke-width="1"/>

  <!-- "DEVELOPER" small text -->
  <text x="200" y="345" text-anchor="middle" font-family="'Oxanium', system-ui, sans-serif" font-size="14" font-weight="600" fill="#00d2c8" fill-opacity="0.4" letter-spacing="8">DEVELOPER</text>
</svg>
